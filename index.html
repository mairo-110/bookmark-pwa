<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Local Bookmark PWA</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="app-card">
        <section class="hero">
          <p class="eyebrow">iPhone local bookmarks</p>
          <h1>URLを貼るだけで、端末内に保存するブックマーク</h1>
          <p class="lede">保存データはこの端末のブラウザ内だけに保持され、同じドメインごとにまとまって表示されます。</p>
        </section>

        <section class="composer" aria-label="bookmark composer">
          <form id="bookmark-form" class="composer-form">
            <label class="field" for="bookmark-title">
              <span>タイトル</span>
              <input id="bookmark-title" name="title" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="記事のタイトルやメモ" />
            </label>
            <label class="field" for="bookmark-url">
              <span>URL</span>
              <input id="bookmark-url" name="url" type="url" inputmode="url" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="https://example.com/article" required />
            </label>
            <button type="submit" class="primary-action">保存する</button>
          </form>
          <p class="hint">長押しや共有メニューでコピーしたURLをそのまま貼り付けられます。</p>
        </section>

        <section class="toolbar">
          <div>
            <p class="toolbar-label">保存数</p>
            <strong id="bookmark-count">0</strong>
          </div>
          <label class="sort-control" for="sort-mode">
            <span>並び順</span>
            <select id="sort-mode" name="sort-mode">
              <option value="favorite-first" selected>お気に入り優先</option>
              <option value="newest">新しい順</option>
              <option value="oldest">古い順</option>
            </select>
          </label>
          <div class="toolbar-actions">
            <button id="export-data" class="ghost-action" type="button">エクスポート</button>
            <button id="import-data" class="ghost-action" type="button">インポート</button>
            <button id="clear-all" class="ghost-action" type="button">すべて削除</button>
          </div>
        </section>

        <input id="import-file" class="visually-hidden" type="file" accept="application/json" />

        <section id="status" class="status" role="status" aria-live="polite"></section>

        <nav id="domain-tabs" class="domain-tabs" aria-label="ドメインのタブ"></nav>

        <section id="bookmark-list" class="bookmark-list" aria-label="saved bookmarks"></section>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
