<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bookmark PWA">
  <title>Bookmark PWA</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body data-page="main">
  <main class="app-shell">
    <section class="hero-card panel">
      <div class="hero-card__copy">
        <p class="eyebrow">Bookmark PWA</p>
        <h1>Safari の URL を保存して、Provider ごとにまとめる。</h1>
        <p class="hero-card__description">iPhone での読み返しに向けて、ローカルだけで完結するブックマーク PWA です。</p>
      </div>
      <button id="settings-button" class="ghost-button" type="button">設定</button>
    </section>

    <section class="panel composer">
      <form id="bookmark-form" class="composer__form">
        <label class="field">
          <span class="field__label">URL</span>
          <input id="bookmark-url" class="field__input" type="url" inputmode="url" autocomplete="off" placeholder="https://example.com/article" required>
        </label>

        <div class="composer__actions">
          <button id="paste-button" class="secondary-button" type="button">貼り付け</button>
          <button id="save-button" class="primary-button" type="submit">保存</button>
        </div>
      </form>
      <p id="status-message" class="status" role="status" aria-live="polite"></p>
    </section>

    <section class="panel list-panel">
      <div class="list-panel__header">
        <h2>ブックマーク</h2>
        <p>Provider ごとに自動分類されます。</p>
      </div>
      <div id="bookmark-sections" class="bookmark-sections"></div>
    </section>
  </main>

  <script src="./js/bootstrap.js"></script>
</body>
</html>
