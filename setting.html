<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bookmark PWA">
  <title>Bookmark PWA - 設定</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body data-page="settings">
  <main class="app-shell">
    <section class="hero-card panel">
      <div class="hero-card__copy">
        <p class="eyebrow">Initial Setup</p>
        <h1>Provider のドメインを登録する。</h1>
        <p class="hero-card__description">3 つの Provider に対して、サイトのドメインだけを入力してください。設定は端末内に保存されます。</p>
      </div>
      <a class="ghost-button ghost-button--link" href="./index.html">戻る</a>
    </section>

    <section class="panel composer">
      <form id="settings-form" class="settings-form">
        <label class="field">
          <span class="field__label">Provider 1 ドメイン</span>
          <input id="provider1-domain" class="field__input" type="text" autocomplete="off" placeholder="example1.com" required>
        </label>

        <label class="field">
          <span class="field__label">Provider 2 ドメイン</span>
          <input id="provider2-domain" class="field__input" type="text" autocomplete="off" placeholder="example2.com" required>
        </label>

        <label class="field">
          <span class="field__label">Provider 3 ドメイン</span>
          <input id="provider3-domain" class="field__input" type="text" autocomplete="off" placeholder="example3.com" required>
        </label>

        <div class="composer__actions">
          <button id="settings-save-button" class="primary-button" type="submit">保存して開始</button>
        </div>
      </form>
      <p id="settings-status" class="status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="./js/bootstrap.js"></script>
</body>
</html>
